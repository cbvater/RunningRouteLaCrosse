<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Running Routes</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

    <style>
        :root {
          --bg:       #0e1a12;
          --panel:    #152019;
          --border:   #1f3328;
          --accent:   #4ade80;
          --accent2:  #86efac;
          --text:     #e2f0e6;
          --muted:    #6b8f74;
          --danger:   #f87171;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
          font-family: 'DM Sans', sans-serif;
          background: var(--bg);
          color: var(--text);
          height: 100vh;
          display: flex;
          flex-direction: column;
          overflow: hidden;
        }

        /* ── Header ── */
        header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 0 28px;
          height: 56px;
          background: var(--panel);
          border-bottom: 1px solid var(--border);
          flex-shrink: 0;
          z-index: 1000;
        }

        .logo {
          font-family: 'Bebas Neue', sans-serif;
          font-size: 1.6rem;
          letter-spacing: 3px;
          color: var(--accent);
        }

        .logo span { color: var(--text); }

        .status {
          display: flex;
          align-items: center;
          gap: 8px;
          font-size: 0.75rem;
          color: var(--muted);
        }

        .dot {
          width: 8px; height: 8px;
          border-radius: 50%;
          background: var(--accent);
          animation: pulse 2s infinite;
        }

        .dot.error { background: var(--danger); animation: none; }

        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50%       { opacity: 0.3; }
        }

        /* ── Main layout ── */
        .main {
          display: flex;
          flex: 1;
          overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
          width: 300px;
          flex-shrink: 0;
          background: var(--panel);
          border-right: 1px solid var(--border);
          display: flex;
          flex-direction: column;
          overflow: hidden;
        }

        .sidebar-header {
          padding: 20px 20px 12px;
          border-bottom: 1px solid var(--border);
        }

        .sidebar-header h2 {
          font-family: 'Bebas Neue', sans-serif;
          font-size: 1rem;
          letter-spacing: 2px;
          color: var(--muted);
        }

        .route-count {
          font-size: 0.72rem;
          color: var(--muted);
          margin-top: 2px;
        }

        .route-list {
          flex: 1;
          overflow-y: auto;
          padding: 8px 0;
        }

        .route-list::-webkit-scrollbar { width: 4px; }
        .route-list::-webkit-scrollbar-track { background: transparent; }
        .route-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .route-card {
          margin: 6px 12px;
          padding: 14px 16px;
          border-radius: 8px;
          border: 1px solid var(--border);
          cursor: pointer;
          transition: all 0.18s ease;
          background: var(--bg);
        }

        .route-card:hover {
          border-color: var(--accent);
          background: rgba(74, 222, 128, 0.05);
        }

        .route-card.active {
          border-color: var(--accent);
          background: rgba(74, 222, 128, 0.08);
        }

        .route-name {
          font-size: 0.95rem;
          font-weight: 500;
          margin-bottom: 8px;
          color: var(--text);
        }

        .route-card.active .route-name { color: var(--accent); }

        .route-stats {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 6px;
        }

        .stat {
          display: flex;
          flex-direction: column;
          gap: 1px;
        }

        .stat-label {
          font-size: 0.65rem;
          text-transform: uppercase;
          letter-spacing: 1px;
          color: var(--muted);
        }

        .stat-value {
          font-size: 0.82rem;
          font-weight: 500;
          color: var(--text);
        }

        .badge {
          display: inline-block;
          padding: 2px 8px;
          border-radius: 20px;
          font-size: 0.65rem;
          font-weight: 500;
          text-transform: uppercase;
          letter-spacing: 0.5px;
          margin-top: 8px;
          border: 1px solid;
        }

        .badge-paved    { color: #60a5fa; border-color: #60a5fa44; background: #60a5fa11; }
        .badge-trail    { color: #a3e635; border-color: #a3e63544; background: #a3e63511; }
        .badge-gravel   { color: #fb923c; border-color: #fb923c44; background: #fb923c11; }
        .badge-default  { color: var(--muted); border-color: var(--border); }

        .no-routes {
          padding: 40px 20px;
          text-align: center;
          color: var(--muted);
          font-size: 0.85rem;
          line-height: 1.6;
        }

        .loading-spinner {
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 40px;
          gap: 10px;
          color: var(--muted);
          font-size: 0.85rem;
        }

        .spinner {
          width: 18px; height: 18px;
          border: 2px solid var(--border);
          border-top-color: var(--accent);
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Map ── */
        #map {
          flex: 1;
          background: #0a1510;
        }

        /* ── Info panel (bottom of sidebar) ── */
        .info-panel {
          border-top: 1px solid var(--border);
          padding: 16px 20px;
          font-size: 0.78rem;
          color: var(--muted);
          line-height: 1.6;
        }

        .info-panel strong { color: var(--accent2); }
    </style>
</head>
<body>

<header>
    <div class="logo">ROUTE<span>MAP</span></div>
    <div class="status">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Connecting...</span>
    </div>
</header>

<div class="main">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Running Routes</h2>
            <div class="route-count" id="routeCount">Loading...</div>
        </div>

        <div class="route-list" id="routeList">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <span>Fetching routes...</span>
            </div>
        </div>

        <div class="info-panel">
            Click a route to <strong>zoom in</strong> and highlight it on the map.
        </div>
    </aside>

    <div id="map"></div>
</div>

<script>
    const API_URL = 'http://localhost:8082/api/routes';

    // ── Map setup ──
    const map = L.map('map', { zoomControl: false }).setView([43.818, -91.238], 13);

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // Dark terrain tiles
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CARTO',
      maxZoom: 19
    }).addTo(map);

    // ── State ──
    let routeLayers = {};
    let activeId = null;

    // ── Fetch routes from Spring Boot API ──
    async function loadRoutes() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const routes = await res.json();

        setStatus(true, `Connected · ${routes.length} route${routes.length !== 1 ? 's' : ''}`);
        document.getElementById('routeCount').textContent =
          `${routes.length} route${routes.length !== 1 ? 's' : ''} available`;

        renderSidebar(routes);
        renderMapRoutes(routes);

      } catch (err) {
        setStatus(false, 'Could not connect to API');
        document.getElementById('routeCount').textContent = 'Failed to load';
        document.getElementById('routeList').innerHTML =
          `<div class="no-routes">Could not reach the API at<br><strong>${API_URL}</strong><br><br>Make sure your Spring Boot app is running.</div>`;
      }
    }

    function setStatus(ok, msg) {
      document.getElementById('statusDot').className = 'dot' + (ok ? '' : ' error');
      document.getElementById('statusText').textContent = msg;
    }

    // ── Sidebar ──
    function renderSidebar(routes) {
      const list = document.getElementById('routeList');

      if (routes.length === 0) {
        list.innerHTML = '<div class="no-routes">No routes found in the database yet.</div>';
        return;
      }

      list.innerHTML = routes.map(r => `
        <div class="route-card" id="card-${r.id}" onclick="selectRoute(${r.id})">
          <div class="route-name">${r.name || 'Unnamed Route'}</div>
          <div class="route-stats">
            <div class="stat">
              <span class="stat-label">Distance</span>
              <span class="stat-value">${r.distance != null ? r.distance + ' mi' : '—'}</span>
            </div>
            <div class="stat">
              <span class="stat-label">Elevation</span>
              <span class="stat-value">${r.ftGain != null ? r.ftGain + ' ft' : '—'}</span>
            </div>
            <div class="stat">
              <span class="stat-label">Rating</span>
              <span class="stat-value">${r.runnerRating != null ? '★'.repeat(r.runnerRating) : '—'}</span>
            </div>
          </div>
          ${r.surface ? `<span class="badge ${badgeClass(r.surface)}">${r.surface}</span>` : ''}
        </div>
      `).join('');
    }

    function badgeClass(surface) {
      const s = surface.toLowerCase();
      if (s.includes('pave') || s.includes('asphalt')) return 'badge-paved';
      if (s.includes('trail') || s.includes('dirt'))   return 'badge-trail';
      if (s.includes('gravel'))                         return 'badge-gravel';
      return 'badge-default';
    }

    // ── Map routes ──
    function renderMapRoutes(routes) {
      routes.forEach(r => {
        if (!r.routeGeoJson) return;

        try {
          const geo = JSON.parse(r.routeGeoJson);

          const layer = L.geoJSON(geo, {
            style: {
              color: '#4ade80',
              weight: 3,
              opacity: 0.7,
              lineJoin: 'round',
              lineCap: 'round'
            }
          }).addTo(map);

          layer.on('click', () => selectRoute(r.id));
          routeLayers[r.id] = layer;

        } catch (e) {
          console.warn(`Invalid GeoJSON for route ${r.id}`, e);
        }
      });

      // Fit map to all routes
      const allLayers = Object.values(routeLayers);
      if (allLayers.length > 0) {
        const group = L.featureGroup(allLayers);
        map.fitBounds(group.getBounds().pad(0.1));
      }
    }

    // ── Select a route ──
    function selectRoute(id) {
      // Reset previous
      if (activeId !== null) {
        document.getElementById(`card-${activeId}`)?.classList.remove('active');
        routeLayers[activeId]?.setStyle({ color: '#4ade80', weight: 3, opacity: 0.7 });
      }

      activeId = id;

      // Highlight card
      const card = document.getElementById(`card-${id}`);
      card?.classList.add('active');
      card?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      // Highlight layer and zoom
      const layer = routeLayers[id];
      if (layer) {
        layer.setStyle({ color: '#ffffff', weight: 5, opacity: 1 });
        map.fitBounds(layer.getBounds().pad(0.15));
      }
    }

    loadRoutes();
</script>
</body>
</html>
